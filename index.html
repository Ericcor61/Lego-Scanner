<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGO Inventory AI Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .drop-zone { border: 2px dashed #3b82f6; transition: all 0.3s; }
        .drop-zone:hover { background-color: #eff6ff; border-color: #2563eb; }
        #canvas-container { position: relative; display: inline-block; }
        video { transform: scaleX(-1); } /* Mirror for natural feel */
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
        <header class="bg-blue-600 p-6 text-white text-center">
            <h1 class="text-3xl font-bold">LEGO Part Color & Price Scanner</h1>
            <p class="mt-2 text-blue-100 italic underline decoration-yellow-400">Scan, count, and check market values</p>
        </header>

        <main class="p-8">
            <!-- Camera & Upload Section -->
            <div id="upload-section" class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <!-- Direct Camera Feature -->
                <div class="bg-gray-50 p-6 rounded-xl border-2 border-gray-200 text-center">
                    <h3 class="text-lg font-semibold mb-4">Snap a Photo</h3>
                    <div id="camera-container" class="bg-black rounded-lg overflow-hidden aspect-video mb-4 flex items-center justify-center">
                        <video id="video" autoplay playsinline class="w-full h-full hidden"></video>
                        <div id="camera-placeholder" class="text-gray-400">Camera inactive</div>
                    </div>
                    <div class="flex gap-2 justify-center">
                        <button id="start-camera" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg">Start Camera</button>
                        <button id="capture-btn" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg hidden">Capture Brick</button>
                    </div>
                </div>

                <!-- Drop Zone -->
                <div id="drop-zone" class="drop-zone rounded-xl p-6 flex flex-col justify-center text-center cursor-pointer">
                    <svg class="mx-auto h-12 w-12 text-blue-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    <p class="text-gray-700 font-medium">Or Drag & Drop Images</p>
                    <input type="file" id="file-input" class="hidden" accept="image/*">
                </div>
            </div>

            <!-- Analysis UI -->
            <div id="analysis-container" class="hidden grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="space-y-4">
                    <h2 class="text-xl font-semibold text-gray-800">Visual Analysis</h2>
                    <div id="canvas-container" class="w-full bg-gray-100 rounded-lg overflow-hidden flex justify-center">
                        <canvas id="image-canvas" class="max-w-full h-auto"></canvas>
                    </div>
                    <div class="flex gap-4">
                        <button id="scan-btn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition">Run AI Analysis</button>
                        <button id="reset-btn" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 px-6 rounded-lg transition">Clear</button>
                    </div>
                </div>

                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                        <h2 class="text-xl font-semibold text-gray-800">Detected Inventory</h2>
                        <button id="export-btn" class="hidden bg-green-600 hover:bg-green-700 text-white text-sm font-bold py-2 px-4 rounded-lg">Export (.xlsx)</button>
                    </div>
                    
                    <div class="bg-gray-50 rounded-lg border border-gray-200 overflow-hidden">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-200 text-gray-700 text-sm uppercase">
                                    <th class="p-4">Color/Part</th>
                                    <th class="p-4">Qty</th>
                                    <th class="p-4">Avg. Used Price</th>
                                </tr>
                            </thead>
                            <tbody id="results-table-body">
                                <tr><td colspan="3" class="p-8 text-center text-gray-400 italic">No items scanned yet</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const video = document.getElementById('video');
        const startCamBtn = document.getElementById('start-camera');
        const captureBtn = document.getElementById('capture-btn');
        const canvas = document.getElementById('image-canvas');
        const ctx = canvas.getContext('2d');
        const resultsTable = document.getElementById('results-table-body');
        const analysisContainer = document.getElementById('analysis-container');
        const uploadSection = document.getElementById('upload-section');
        const exportBtn = document.getElementById('export-btn');
        let inventoryData = [];

        // --- CAMERA LOGIC ---
        startCamBtn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                video.classList.remove('hidden');
                document.getElementById('camera-placeholder').classList.add('hidden');
                captureBtn.classList.remove('hidden');
                startCamBtn.classList.add('hidden');
            } catch (err) {
                alert("Camera access denied or not available.");
            }
        };

        captureBtn.onclick = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            // Draw mirrored if using front cam, but here we just draw directly
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            stopCamera();
            showAnalysis();
        };

        function stopCamera() {
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
        }

        // --- IMAGE HANDLING ---
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleImage(e.target.files[0]);
        
        function handleImage(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    showAnalysis();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function showAnalysis() {
            uploadSection.classList.add('hidden');
            analysisContainer.classList.remove('hidden');
        }

        document.getElementById('reset-btn').onclick = () => {
            location.reload(); // Simple reset
        };

        // --- UPDATED AI LOGIC WITH PRICE ---
        document.getElementById('scan-btn').onclick = () => {
            const btn = document.getElementById('scan-btn');
            btn.disabled = true;
            btn.innerText = "Estimating Market Value...";

            setTimeout(() => {
                analyzeImage();
                btn.disabled = false;
                btn.innerText = "Run AI Analysis";
                exportBtn.classList.remove('hidden');
            }, 1200);
        };

        function analyzeImage() {
            // Mock Market Data (Price per unit)
            const marketPrices = {
                'Brick 2x4': 0.12,
                'Plate 2x2': 0.05,
                'Brick 1x2': 0.03,
                'Plate 1x4': 0.07
            };

            inventoryData = [
                { color: 'Bright Red', part: 'Brick 2x4', qty: Math.floor(Math.random() * 5) + 1 },
                { color: 'Bright Blue', part: 'Plate 2x2', qty: Math.floor(Math.random() * 8) + 1 },
                { color: 'White', part: 'Brick 1x2', qty: Math.floor(Math.random() * 12) + 1 },
                { color: 'Yellow', part: 'Plate 1x4', qty: Math.floor(Math.random() * 4) + 1 }
            ].map(item => ({
                ...item,
                avgPrice: (marketPrices[item.part] || 0.05).toFixed(2)
            }));

            updateTable();
            drawDetections();
        }

        function updateTable() {
            resultsTable.innerHTML = '';
            inventoryData.forEach(item => {
                const row = `
                    <tr class="border-t border-gray-100 hover:bg-gray-50">
                        <td class="p-4">
                            <div class="flex items-center gap-2">
                                <span class="w-3 h-3 rounded-full" style="background-color: ${item.color.split(' ')[1].toLowerCase()}"></span>
                                <span class="font-semibold text-gray-700">${item.part}</span>
                            </div>
                            <span class="text-xs text-gray-400">${item.color}</span>
                        </td>
                        <td class="p-4 text-center font-bold text-blue-600">${item.qty}</td>
                        <td class="p-4 text-green-600 font-mono font-bold">$${item.avgPrice} <span class="text-[10px] text-gray-400">ea</span></td>
                    </tr>
                `;
                resultsTable.innerHTML += row;
            });
        }

        function drawDetections() {
            for(let i=0; i<8; i++) {
                const x = Math.random() * canvas.width * 0.7;
                const y = Math.random() * canvas.height * 0.7;
                ctx.strokeStyle = '#10b981';
                ctx.lineWidth = Math.max(2, canvas.width / 200);
                ctx.strokeRect(x, y, 80, 50);
            }
        }

        exportBtn.onclick = () => {
            const worksheet = XLSX.utils.json_to_sheet(inventoryData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Lego Inventory");
            XLSX.writeFile(workbook, "Lego_Market_Inventory.xlsx");
        };
    </script>
</body>
</html>
