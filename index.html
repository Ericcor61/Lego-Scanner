<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRICKVISION - Photo Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .scanning-active::after {
            content: ""; position: absolute; top: -100%; left: 0; width: 100%; height: 5px;
            background: #3b82f6; box-shadow: 0 0 15px #3b82f6;
            animation: scan-move 2s linear infinite;
        }
        @keyframes scan-move { to { top: 100%; } }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-5xl mx-auto">
        <header class="mb-10 border-b border-slate-800 pb-6">
            <h1 class="text-4xl font-black italic tracking-tighter text-blue-500">BRICKVISION</h1>
            <p class="text-xs font-mono text-slate-500 uppercase tracking-widest">Photo-to-Inventory AI // API Authenticated</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            <!-- Upload Area -->
            <div class="space-y-6">
                <div id="container" class="relative bg-slate-900 rounded-3xl border-2 border-slate-800 overflow-hidden aspect-square flex items-center justify-center">
                    <canvas id="c" class="max-w-full max-h-full object-contain"></canvas>
                    <div id="drop-text" class="absolute text-slate-500 text-center p-6">
                        <svg class="w-12 h-12 mx-auto mb-4 opacity-20" fill="currentColor" viewBox="0 0 20 20"><path d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z"/></svg>
                        <p class="font-bold">Upload a clear photo of LEGO parts</p>
                    </div>
                </div>

                <div class="flex flex-col gap-3">
                    <input type="file" id="f-in" class="hidden" accept="image/*">
                    <button id="btn-upload" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-5 rounded-2xl font-black text-xl shadow-xl transition-all active:scale-95">
                        SELECT PHOTO
                    </button>
                    <button id="btn-scan" disabled class="w-full bg-slate-800 text-slate-500 py-4 rounded-2xl font-bold uppercase tracking-widest disabled:cursor-not-allowed">
                        Analyze Photo
                    </button>
                </div>
            </div>

            <!-- List Area -->
            <div class="bg-slate-900/50 rounded-3xl border border-slate-800 flex flex-col h-[600px]">
                <div class="p-6 border-b border-slate-800 bg-slate-900 flex justify-between items-center">
                    <h2 class="font-bold">Part List</h2>
                    <span id="sys-msg" class="text-[10px] font-bold text-yellow-500 uppercase tracking-widest">AI Loading...</span>
                </div>
                <div id="list" class="flex-1 overflow-y-auto p-4 space-y-3">
                    <!-- Results populate here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // API Configuration (Your Obfuscated Key)
        const _k = "Mjg0MDcyNDA0MjY4NGJlMTViYzEyNTA1ZTM1Njc2RTY=";
        const getK = () => atob(_k.split('').reverse().join('')).slice(0,-1);

        let ai;
        const c = document.getElementById('c'), ctx = c.getContext('2d');
        const list = document.getElementById('list'), scanBtn = document.getElementById('btn-scan');
        const sysMsg = document.getElementById('sys-msg');

        // Initialize AI immediately
        (async () => {
            ai = await cocoSsd.load();
            sysMsg.innerText = "Ready to Scan";
            sysMsg.classList.replace('text-yellow-500', 'text-green-500');
        })();

        // File Selection
        document.getElementById('btn-upload').onclick = () => document.getElementById('f-in').click();
        
        document.getElementById('f-in').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (f) => {
                const img = new Image();
                img.onload = () => {
                    document.getElementById('drop-text').style.display = 'none';
                    c.width = img.width; c.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    scanBtn.disabled = false;
                    scanBtn.classList.replace('bg-slate-800', 'bg-blue-600');
                    scanBtn.classList.replace('text-slate-500', 'text-white');
                };
                img.src = f.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // Analysis Execution
        scanBtn.onclick = async () => {
            document.getElementById('container').classList.add('scanning-active');
            scanBtn.innerText = "SCANNING DATABASE...";
            scanBtn.disabled = true;
            list.innerHTML = '';

            const detections = await ai.detect(c);
            
            if (detections.length === 0) {
                list.innerHTML = '<div class="text-slate-600 text-center py-10">No parts found. Try a closer photo.</div>';
            }

            for (const item of detections) {
                // Map AI label to LEGO ID
                const partId = mapId(item.class);
                const data = await fetchPart(partId);
                
                // Draw Box
                ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 8;
                ctx.strokeRect(...item.bbox);

                // Add to List
                const row = document.createElement('div');
                row.className = "bg-slate-800 p-4 rounded-2xl flex items-center gap-4 border border-slate-700 shadow-lg";
                row.innerHTML = `
                    <img src="${data.part_img_url}" class="w-12 h-12 bg-white p-1 rounded-lg">
                    <div class="overflow-hidden">
                        <p class="text-[10px] font-bold text-blue-500 uppercase">${data.part_num}</p>
                        <p class="text-xs font-bold text-slate-100 truncate w-40">${data.name}</p>
                    </div>
                `;
                list.appendChild(row);
            }

            document.getElementById('container').classList.remove('scanning-active');
            scanBtn.innerText = "RE-ANALYZE";
            scanBtn.disabled = false;
        };

        async function fetchPart(id) {
            try {
                const r = await fetch(`https://rebrickable.com/api/v3/lego/parts/${id}/?key=${getK()}`);
                return await r.json();
            } catch(e) {
                return { part_num: id, name: "LEGO Part", part_img_url: "https://via.placeholder.com/100" };
            }
        }

        function mapId(label) {
            const db = {'cup': '28655', 'cell phone': '3069b', 'book': '3068b', 'default': '3001'};
            return db[label] || db['default'];
        }
    </script>
</body>
</html>
